name: Test Template

on:
    workflow_call:
        inputs:
            env:
                required: true
                type: string

# Minimal permissions — only repo read access needed to checkout and run tests
permissions:
    contents: read

# Opt into Node.js 24 for action runners (checkout, setup-node, upload-artifact).
# Avoids the Node.js 20 deprecation warning. Remove once @v4 actions default to Node 24.
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers and OS dependencies
              # --with-deps installs required system libraries (libnss, libgbm, etc.)
              # without this the browser may fail to launch on a clean runner
              run: npx playwright install --with-deps chromium

            - name: Run API tests
              run: npm run test:api
              env:
                  CI: 'true'
                  SERVER: ${{ inputs.env }}
                  # AGENT1_PASSWORD and AGENT2_PASSWORD must be stored as GitHub Actions secrets
                  AGENT1_PASSWORD: ${{ secrets.AGENT1_PASSWORD }}
                  AGENT2_PASSWORD: ${{ secrets.AGENT2_PASSWORD }}

            - name: Run E2E tests
              run: npm run test:e2e
              env:
                  CI: 'true'
                  SERVER: ${{ inputs.env }}
                  AGENT1_PASSWORD: ${{ secrets.AGENT1_PASSWORD }}
                  AGENT2_PASSWORD: ${{ secrets.AGENT2_PASSWORD }}

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-${{ inputs.env }}
                  # HTML report (playwright-report/) and JUnit XML (reports/) are both uploaded
                  path: |
                      playwright-report/
                      reports/
                  retention-days: 14

name: API Tests

on:
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
  #schedule:
    #- cron: '0,5,10 12 * * 1,2,3,5'  # At 12:00, 12:05, and 12:10 on Monday, Tuesday, Wednesday, and Friday
  push:
    branches:
      - main  # Run on every push to the main branch

# Minimal permissions — read-only access is sufficient for running tests
permissions:
  contents: read

# Opt into Node.js 24 for action runners (checkout, setup-node, upload-artifact).
# Avoids the Node.js 20 deprecation warning. Remove once @v4 actions default to Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-someEnv:
    uses: ./.github/workflows/api-test-template.yml
    with:
      env: example

  #test-someOtherEnv:
  #  uses: ./.github/workflows/api-test-template.yml
  #  with:
  #    env: someOtherEnv